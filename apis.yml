apis:
  - aid: acoustid:acoustid-api
    name: AcoustID Web Service API
    description: REST API for audio fingerprint lookup and submission. Accepts Chromaprint-generated fingerprints and returns AcoustID track identifiers along with linked MusicBrainz metadata including recordings, artists, and releases.
